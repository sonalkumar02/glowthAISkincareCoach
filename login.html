<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Glowth login page for your personalized AI skincare dashboard.">
  <meta name="theme-color" content="#5d43ff">
  <title>Login | Glowth</title>
  <link rel="icon" type="image/png" href="./assests/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #efebff;
      --ink: #1f1a32;
      --muted: #5d5a74;
      --line: rgba(107, 88, 187, 0.14);
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --violet: #5d43ff;
      --violet-deep: #7f61ff;
      --violet-soft: #9bd4ff;
      --shadow: 0 28px 70px rgba(97, 78, 186, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(93, 67, 255, 0.18), transparent 30%),
        radial-gradient(circle at 86% 12%, rgba(155, 212, 255, 0.2), transparent 26%),
        linear-gradient(180deg, #f6f1ff 0%, var(--bg) 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 34vw;
      height: 34vw;
      border-radius: 50%;
      filter: blur(22px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -10vw;
      left: -10vw;
      background: radial-gradient(circle, rgba(93, 67, 255, 0.22), transparent 65%);
    }

    body::after {
      right: -12vw;
      bottom: -12vw;
      background: radial-gradient(circle, rgba(155, 212, 255, 0.22), transparent 65%);
    }

    .login-page {
      position: relative;
      z-index: 1;
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    .login-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--ink);
      text-decoration: none;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand-link img {
      width: 44px;
      height: 44px;
      display: block;
    }

    .brand-copy {
      display: grid;
      gap: 2px;
    }

    .brand-copy span {
      font-size: 15px;
      line-height: 1;
    }

    .brand-copy small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid rgba(107, 88, 187, 0.12);
      background: rgba(255, 255, 255, 0.66);
      color: var(--ink);
      text-decoration: none;
      font: 700 13px/1 "Inter", sans-serif;
      box-shadow: 0 12px 24px rgba(85, 68, 169, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .back-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(85, 68, 169, 0.12);
      background: rgba(255, 255, 255, 0.84);
    }

    .login-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
      gap: 22px;
      align-items: stretch;
    }

    .story-panel,
    .form-panel {
      min-height: calc(100vh - 122px);
    }

    .story-panel {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      padding: 34px;
      background:
        linear-gradient(145deg, rgba(93, 67, 255, 0.98), rgba(127, 97, 255, 0.92)),
        linear-gradient(180deg, #6d55ff, #4f38d0);
      color: #fff;
      box-shadow: 0 30px 80px rgba(93, 67, 255, 0.24);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      isolation: isolate;
    }

    .story-panel::before,
    .story-panel::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.5;
      z-index: -1;
    }

    .story-panel::before {
      width: 260px;
      height: 260px;
      top: -80px;
      right: -40px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.22), transparent 68%);
    }

    .story-panel::after {
      width: 320px;
      height: 320px;
      left: -120px;
      bottom: -130px;
      background: radial-gradient(circle, rgba(155, 212, 255, 0.2), transparent 66%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font: 700 12px/1 "Inter", sans-serif;
      letter-spacing: 0.02em;
      backdrop-filter: blur(14px);
    }

    h1,
    h2 {
      margin: 0;
      font-family: "Plus Jakarta Sans", sans-serif;
      letter-spacing: -0.07em;
    }

    h1 {
      margin-top: 18px;
      max-width: 560px;
      font-size: clamp(42px, 5vw, 68px);
      line-height: 0.94;
    }

    .story-copy {
      max-width: 540px;
      margin: 16px 0 0;
      color: rgba(255, 255, 255, 0.84);
      font-size: 16px;
      line-height: 1.8;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #fff;
      font: 700 12px/1 "Inter", sans-serif;
      backdrop-filter: blur(14px);
    }

    .benefit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .benefit-card {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(16px);
    }

    .benefit-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      line-height: 1.35;
    }

    .benefit-card p {
      margin: 0;
      color: rgba(255, 255, 255, 0.76);
      font-size: 13px;
      line-height: 1.65;
    }

    .preview-card {
      margin-top: 28px;
      padding: 20px;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(17, 17, 24, 0.16);
      backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      font: 700 13px/1 "Inter", sans-serif;
    }

    .preview-badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font-size: 12px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .preview-stat {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .preview-stat span {
      display: block;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .preview-stat strong {
      display: block;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .preview-note {
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      line-height: 1.7;
    }

    .form-panel {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-card {
      width: 100%;
      border-radius: 32px;
      padding: 30px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .form-card h2 {
      margin-top: 8px;
      font-size: clamp(32px, 4vw, 46px);
      line-height: 0.96;
      color: var(--ink);
    }

    .form-intro {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .login-form {
      display: grid;
      gap: 16px;
      margin-top: 26px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font: 700 13px/1 "Inter", sans-serif;
    }

    .field input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 18px;
      border: 1px solid rgba(91, 74, 170, 0.16);
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      font: 500 15px/1.2 "Inter", sans-serif;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .field input::placeholder {
      color: #9a98ab;
    }

    .field input:focus {
      outline: none;
      border-color: var(--violet);
      box-shadow: 0 0 0 4px rgba(93, 67, 255, 0.12);
    }

    .helper-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .helper-row a {
      color: var(--violet);
      text-decoration: none;
      font-weight: 700;
    }

    .helper-row a:hover {
      text-decoration: underline;
    }

    .auth-toggle {
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--violet);
      font: 700 13px/1.5 "Inter", sans-serif;
      cursor: pointer;
    }

    .auth-toggle:hover {
      text-decoration: underline;
    }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #5d43ff, #7f61ff, #9bd4ff);
      color: #fff;
      font: 800 15px/1 "Inter", sans-serif;
      cursor: pointer;
      box-shadow: 0 18px 36px rgba(93, 67, 255, 0.24);
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 42px rgba(93, 67, 255, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.72;
      cursor: progress;
      transform: none;
    }

    .submit-dot {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      color: var(--violet);
      font-size: 14px;
      font-weight: 900;
    }

    .status {
      min-height: 22px;
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .status.success {
      color: #047857;
    }

    .status.error {
      color: #b42318;
    }

    @media (max-width: 980px) {
      .login-page {
        width: min(100% - 20px, 1240px);
        padding-top: 14px;
      }

      .login-grid {
        grid-template-columns: 1fr;
      }

      .story-panel,
      .form-panel {
        min-height: auto;
      }

      .story-panel {
        padding-bottom: 26px;
      }
    }

    @media (max-width: 640px) {
      .login-page {
        width: min(100% - 14px, 1240px);
      }

      .login-topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .story-panel,
      .form-card {
        padding: 20px;
        border-radius: 26px;
      }

      .benefit-grid,
      .preview-grid {
        grid-template-columns: 1fr;
      }

      .helper-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .story-copy {
        font-size: 15px;
      }
    }

    /* Centered login-only layout */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 12px;
    }

    .login-page {
      width: min(520px, 100%);
      margin: 0;
      padding: 0;
    }

    .login-topbar,
    .story-panel {
      display: none !important;
    }

    .login-grid {
      display: block;
    }

    .form-panel {
      min-height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-card {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <main class="login-grid">
      <section class="form-panel" aria-label="Login form">
        <div class="form-card">
          <a class="brand-link" href="./main.html" aria-label="Go to Glowth main page">
          </a>

          <span class="eyebrow" id="authEyebrow">Welcome back</span>
          <h2 id="authTitle">Log in</h2>
          <p class="form-intro" id="authIntro">Use your Glowth account to continue where you left off.</p>

          <form id="loginForm" class="login-form" novalidate>
            <div class="field">
              <label for="email">Email address</label>
              <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <div class="field">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="Your password" autocomplete="current-password" required minlength="6">
            </div>

            <div class="helper-row">
              <span id="authHelperText">New to Glowth?</span>
              <button class="auth-toggle" id="authToggle" type="button">Create account</button>
            </div>

            <button id="loginButton" class="submit-btn" type="submit">
              <span id="authButtonText">Login now</span>
              <span class="submit-dot">&gt;</span>
            </button>

            <div id="loginStatus" class="status" aria-live="polite"></div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/auth.js"></script>
  <script>
    redirectIfAuthenticated();

    const loginForm = document.getElementById('loginForm');
    const loginButton = document.getElementById('loginButton');
    const loginStatus = document.getElementById('loginStatus');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const authEyebrow = document.getElementById('authEyebrow');
    const authTitle = document.getElementById('authTitle');
    const authIntro = document.getElementById('authIntro');
    const authHelperText = document.getElementById('authHelperText');
    const authToggle = document.getElementById('authToggle');
    const authButtonText = document.getElementById('authButtonText');

    let authMode = 'login';

    function setAuthMode(mode) {
      authMode = mode;
      const isSignup = authMode === 'signup';
      authEyebrow.textContent = isSignup ? 'Start your glow plan' : 'Welcome back';
      authTitle.textContent = isSignup ? 'Create account' : 'Log in';
      authIntro.textContent = isSignup
        ? 'Create your Glowth account, then complete the skin quiz to personalize your dashboard.'
        : 'Use your Glowth account to continue where you left off.';
      authHelperText.textContent = isSignup ? 'Already have an account?' : 'New to Glowth?';
      authToggle.textContent = isSignup ? 'Log in' : 'Create account';
      authButtonText.textContent = isSignup ? 'Create account' : 'Login now';
      passwordInput.autocomplete = isSignup ? 'new-password' : 'current-password';
      loginStatus.textContent = '';
      loginStatus.className = 'status';
    }

    authToggle.addEventListener('click', () => {
      setAuthMode(authMode === 'login' ? 'signup' : 'login');
    });

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const isSignup = authMode === 'signup';

      loginStatus.className = 'status';
      loginStatus.textContent = isSignup ? 'Creating your account...' : 'Signing you in...';
      loginButton.disabled = true;

      const result = isSignup ? await signup(email, password) : await login(email, password);

      if (result.success) {
        loginStatus.className = 'status success';
        loginStatus.textContent = isSignup
          ? 'Account created. Opening your skin quiz...'
          : hasCompletedQuiz()
            ? 'Success. Opening your dashboard...'
            : 'Success. Opening your skin quiz...';
        window.setTimeout(() => {
          window.location.replace(isSignup ? './quiz.html' : `./${getPostLoginPath()}`);
        }, 250);
        return;
      }

      loginStatus.className = 'status error';
      loginStatus.textContent = result.error || (isSignup ? 'We could not create your account.' : 'We could not sign you in.');
      loginButton.disabled = false;
    });
  </script>

  <script>
  const waitlistForm = document.querySelector('#waitlist-form');

  if (waitlistForm) {
    waitlistForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.querySelector('#email-input')?.value || '';
      const result = await API.joinWaitlist(email);
      if (result.success) {
        // show success message
      }
    });
  }
</script>
</body>
</html>
